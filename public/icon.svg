<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6B8F6E"/>
      <stop offset="100%" stop-color="#4E6E52"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="110" ry="110" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow ring -->
  <rect x="24" y="24" width="464" height="464" rx="90" ry="90"
        fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>

  <!-- Neural arc paths connecting compass points -->
  <!-- N to E arc -->
  <path d="M 256 130 Q 340 170 382 256" fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- E to S arc -->
  <path d="M 382 256 Q 340 342 256 382" fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- S to W arc -->
  <path d="M 256 382 Q 172 342 130 256" fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- W to N arc -->
  <path d="M 130 256 Q 172 170 256 130" fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Diagonal neural cross-paths (NE to SW, NW to SE) -->
  <path d="M 322 190 Q 256 220 190 322" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="4 6"/>
  <path d="M 190 190 Q 256 220 322 322" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="4 6"/>

  <!-- Compass rose: N point (elongated diamond, larger) -->
  <polygon points="256,96 268,210 256,228 244,210" fill="#F5F0EB" opacity="0.97"/>

  <!-- Compass rose: S point (elongated diamond, larger) -->
  <polygon points="256,416 268,302 256,284 244,302" fill="#F5F0EB" opacity="0.97"/>

  <!-- Compass rose: E point (slightly smaller) -->
  <polygon points="416,256 302,244 284,256 302,268" fill="#F5F0EB" opacity="0.90"/>

  <!-- Compass rose: W point (slightly smaller) -->
  <polygon points="96,256 210,244 228,256 210,268" fill="#F5F0EB" opacity="0.90"/>

  <!-- Neuron dots at compass tips -->
  <circle cx="256" cy="130" r="7" fill="#F5F0EB" filter="url(#glow)"/>
  <circle cx="256" cy="382" r="7" fill="#F5F0EB" filter="url(#glow)"/>
  <circle cx="382" cy="256" r="7" fill="#F5F0EB" filter="url(#glow)"/>
  <circle cx="130" cy="256" r="7" fill="#F5F0EB" filter="url(#glow)"/>

  <!-- Neuron dots at arc midpoints (smaller) -->
  <circle cx="338" cy="176" r="4.5" fill="rgba(255,255,255,0.55)"/>
  <circle cx="338" cy="336" r="4.5" fill="rgba(255,255,255,0.55)"/>
  <circle cx="176" cy="336" r="4.5" fill="rgba(255,255,255,0.55)"/>
  <circle cx="176" cy="176" r="4.5" fill="rgba(255,255,255,0.55)"/>

  <!-- Gold accent ring at center -->
  <circle cx="256" cy="256" r="22" fill="none" stroke="#D4A96A" stroke-width="2.5" opacity="0.85"/>

  <!-- Center neuron circle -->
  <circle cx="256" cy="256" r="14" fill="#F5F0EB" opacity="0.95"/>

  <!-- Center diamond -->
  <polygon points="256,244 264,256 256,268 248,256" fill="#5C7A5F"/>

  <!-- Tiny accent dots on cardinal ring -->
  <circle cx="256" cy="234" r="2.5" fill="#D4A96A" opacity="0.9"/>
  <circle cx="256" cy="278" r="2.5" fill="#D4A96A" opacity="0.9"/>
  <circle cx="234" cy="256" r="2.5" fill="#D4A96A" opacity="0.9"/>
  <circle cx="278" cy="256" r="2.5" fill="#D4A96A" opacity="0.9"/>
</svg>
